name: devenv-build
services:
    debian:
        platform: linux/amd64
        build:
            context: .
            args:
                - WORKDIR=${WORKDIR}
                - DK_USER=${DK_USER}
            network: host
        tty: true
        stdin_open: true
        network_mode: host
        userns_mode: keep-id
        volumes:
            - ../../../:${WORKDIR}/code
